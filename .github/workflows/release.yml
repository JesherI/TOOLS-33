name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get private key
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath "$env:GITHUB_WORKSPACE/private-key.pem" -Encoding utf8 -NoNewline
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "TOOLS-33 v__VERSION__"
          releaseBody: |
            ## ✅ Actualización automática disponible
            
            Los usuarios con TOOLS-33 instalado recibirán esta actualización automáticamente.
            
            ### Cambios en esta versión
            - Mejoras en el sistema de actualizaciones automáticas
            - Correcciones de estabilidad
            
            ### Instalación manual
            1. Descarga el archivo `.msi` de abajo
            2. Ejecuta el instalador
            3. La aplicación se actualizará automáticamente en el futuro
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Sign MSI and generate signature
        run: |
          # Buscar el MSI generado
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
            # Firmar el MSI
            $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath "private-key.pem" -Encoding utf8 -NoNewline
            cargo tauri signer sign -k private-key.pem $msiFile.FullName
            
            # Generar signature base64
            $sigFile = $msiFile.FullName + ".sig"
            if (Test-Path $sigFile) {
              $signature = Get-Content $sigFile -Raw
            } else {
              $signature = ""
            }
            
            # Crear latest.json
            $version = "${{ github.ref_name }}".Replace("v", "")
            $json = @{
              version = $version
              platforms = @{
                "windows-x86_64" = @{
                  url = "https://github.com/JesherI/TOOLS-33/releases/download/v$version/tools-33_$($version)_x64_en-US.msi"
                  signature = $signature
                }
              }
              notes = "✅ Actualización automática disponible"
              pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            } | ConvertTo-Json -Depth 3
            
            $json | Out-File -FilePath "latest.json" -Encoding utf8
            
            # Subir archivos de firma al release
            gh release upload v$version $sigFile --repo JesherI/TOOLS-33 --clobber
          }
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Commit latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f latest.json
          git commit -m "chore: Update latest.json for ${{ github.ref_name }}" || echo "No changes"
          git push || echo "Nothing to push"
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

env:
  NODE_VERSION: 20
