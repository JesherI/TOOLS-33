name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get private key
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY | Out-File -FilePath "$env:GITHUB_WORKSPACE/private-key.pem" -Encoding utf8 -NoNewline
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: "TOOLS-33 v__VERSION__"
          releaseBody: |
            ## ✅ Actualización automática disponible
            
            Los usuarios con TOOLS-33 instalado recibirán esta actualización automáticamente.
            
            ### Cambios en esta versión
            - Mejoras en el sistema de actualizaciones automáticas
            - Correcciones de estabilidad
            
            ### Instalación manual
            1. Descarga el archivo `.msi` de abajo
            2. Ejecuta el instalador
            3. La aplicación se actualizará automáticamente en el futuro
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload signature to release
        run: |
          # Buscar archivos de firma generados por Tauri
          $sigFiles = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.sig" -ErrorAction SilentlyContinue
          if ($sigFiles) {
            foreach ($sigFile in $sigFiles) {
              gh release upload ${{ github.ref_name }} $sigFile.FullName --repo JesherI/TOOLS-33 --clobber
              Write-Host "Uploaded: $($sigFile.Name)"
            }
          }
          
          # Buscar y copiar latest.json si Tauri lo generó
          $latestJson = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "latest.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($latestJson) {
            Copy-Item $latestJson.FullName -Destination "latest.json" -Force
            Write-Host "Found latest.json at: $($latestJson.FullName)"
          }
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest.json from release
        run: |
          # Descargar latest.json del release generado por Tauri
          $version = "${{ github.ref_name }}"
          gh release download $version --pattern "latest.json" --repo JesherI/TOOLS-33 --dir . 2>$null || echo "latest.json not in release"
          
          # Si no está en release, crearlo desde el que Tauri generó en el paso anterior
          if (-not (Test-Path "latest.json")) {
            Write-Host "Creating latest.json manually"
            $ver = $version.Replace("v", "")
            $json = @{
              version = $ver
              platforms = @{
                "windows-x86_64" = @{
                  url = "https://github.com/JesherI/TOOLS-33/releases/download/$version/tools-33_$($ver)_x64_en-US.msi"
                  signature = ""
                }
              }
              notes = "✅ Actualización automática disponible"
              pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            } | ConvertTo-Json -Depth 3
            $json | Out-File -FilePath "latest.json" -Encoding utf8
          }
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f latest.json
          git diff --cached --quiet || (git commit -m "chore: Update latest.json for ${{ github.ref_name }}" && git push)
          Write-Host "latest.json committed to main"
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

env:
  NODE_VERSION: 20
