name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Get private key
        run: |
          Add-Content -Path "$env:GITHUB_WORKSPACE/private-key.pem" -Value "$env:TAURI_SIGNING_PRIVATE_KEY" -NoNewline
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "TOOLS-33 v__VERSION__"
          releaseBody: |
            ## Nueva versión disponible
            
            Esta actualización incluye mejoras de rendimiento y correcciones de errores.
            
            ### Cómo instalar
            1. Descarga el archivo `.exe` o `.msi` de abajo
            2. Ejecuta el instalador
            3. Sigue las instrucciones en pantalla
            
            La aplicación se actualizará automáticamente.
          releaseDraft: true
          prerelease: false
          args: ""

env:
  NODE_VERSION: 20
